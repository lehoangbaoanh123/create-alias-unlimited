function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

let activeData = [];

function initQuiz() {
    activeData = quizData.map((item) => {
        const correct = item[1];
        const options = shuffle([...item.slice(1)]);
        return { q: item[0], options, correct };
    });

    const quizArea = document.getElementById('quiz-area');
    quizArea.innerHTML = activeData.map((item, i) => `
        <div class="question-box" id="q-box-${i}">
            <span class="q-text">Câu ${i+1}: ${item.q}</span>
            <div class="options-list">
                ${item.options.map(opt => `
                    <label class="option-item">
                        <input type="radio" name="question${i}" value="${opt}"> ${opt}
                    </label>
                `).join('')}
            </div>
        </div>
    `).join('');
}

async function sendToTelegram(name, score, total) {
    const percent = ((score / total) * 100).toFixed(1);
    const message = `🔔 *BÁO CÁO KẾT QUẢ*\n\n👤 *Họ tên:* ${name}\n🎯 *Điểm:* ${score}/${total}\n📊 *Tỷ lệ:* ${percent}%\n🕒 *Lúc:* ${new Date().toLocaleString('vi-VN')}`;
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    
    try {
        await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'Markdown' })
        });
    } catch (e) { console.error("Lỗi gửi Bot:", e); }
}

function gradeQuiz() {
    const nameInput = document.getElementById('student-name');
    const name = nameInput.value.trim();
    
    if (!name) {
        alert("⚠️ Vui lòng nhập Họ Tên trước khi nộp bài!");
        nameInput.focus();
        return;
    }

    let score = 0;
    activeData.forEach((item, i) => {
        const box = document.getElementById(`q-box-${i}`);
        const selected = document.querySelector(`input[name="question${i}"]:checked`);
        const labels = box.querySelectorAll('.option-item');
        
        labels.forEach(l => l.classList.remove('correct-ans', 'wrong-ans'));

        if (selected) {
            if (selected.value === item.correct) {
                score++;
                selected.parentElement.classList.add('correct-ans');
            } else {
                selected.parentElement.classList.add('wrong-ans');
                labels.forEach(l => { if (l.innerText.trim() === item.correct) l.classList.add('correct-ans'); });
            }
        } else {
            labels.forEach(l => { if (l.innerText.trim() === item.correct) l.classList.add('correct-ans'); });
        }
    });

    const result = document.getElementById('result-display');
    result.style.display = 'block';
    result.innerHTML = `🏁 KẾT QUẢ CỦA ${name.toUpperCase()}: ${score} / ${activeData.length} CÂU ĐÚNG`;
    
    document.getElementById('btn-submit').disabled = true;
    document.getElementById('btn-submit').innerText = "ĐÃ GỬI KẾT QUẢ VỀ HỆ THỐNG";
    nameInput.disabled = true;

    sendToTelegram(name, score, activeData.length);
    window.scrollTo({top: 0, behavior: 'smooth'});
}

initQuiz();
