const quiz = document.getElementById("quiz");
let answers = [];

data.forEach((item,i)=>{
    answers.push(item.ops[0]);
    let html = `<div class="question"><b>${item.q}</b>`;
    item.ops.sort(()=>Math.random()-0.5).forEach(op=>{
        html += `<label><input type="radio" name="q${i}" value="${op}"> ${op}</label>`;
    });
    html += "</div>";
    quiz.innerHTML += html;
});

function check(){
    let score=0;
    data.forEach((q,i)=>{
        let s=document.querySelector(`input[name=q${i}]:checked`);
        if(s && s.value===answers[i]) score++;
    });
    document.getElementById("result").innerText="Điểm: "+score+"/"+data.length;
}
