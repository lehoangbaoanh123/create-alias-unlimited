<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn thi Quốc phòng An ninh</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; padding: 20px; background: #f4f7f6; max-width: 800px; margin: auto; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .user-info { margin-bottom: 25px; text-align: center; }
        input { padding: 12px; width: 90%; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .question { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .options { display: flex; flex-direction: column; margin-top: 10px; }
        label { cursor: pointer; padding: 8px; border-radius: 4px; transition: 0.2s; }
        label:hover { background: #eef6ff; }
        button { display: block; width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 20px; }
        button:hover { background: #219150; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; font-weight: bold; font-size: 1.3em; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>ĐỀ CƯƠNG ÔN THI QP-AN</h1>
    <div class="user-info">
        <input type="text" id="username" placeholder="Nhập tên của bạn để nộp bài...">

{ q: "8. Tình huống trồng cây thuốc phiện là:", ops: ["Trồng cây có chứa chất ma túy.", "Sản xuất ma túy.", "Cản trở xét nghiệm.", "Lôi kéo người khác."] },

{ q: "13. Không phải dấu hiệu nghiện:", ops: ["Cơ thể khỏe mạnh, học tốt.", "Toát mồ hôi, da xanh.", "Hoảng tưởng.", "Cất giấu ma túy."] },

{ q: "16. Không đúng nguyên tắc giao thông:", ops: ["Không bật đèn tín hiệu.", "Đi bên phải.", "Đúng làn.", "Chấp hành biển báo."] },
{ q: "17. Người điều khiển phải:", ops: ["Giảm tốc, nhường đường.", "Tăng tốc.", "Dừng xe.", "Không cần nhường."] },
{ q: "18. Xe bị vượt phải:", ops: ["Giảm tốc, nhường đường.", "Bật đèn.", "Tăng tốc.", "Đi trái."] },

{ q: "20. Người lái xe phải:", ops: ["Đội mũ bảo hiểm cài quai.", "Đi vào đường bộ.", "Sai làn.", "Không cài quai."] },
{ q: "21. Người đi bộ không được:", ops: ["Đu bám xe.", "Đi vỉa hè.", "Qua vạch.", "Tuân thủ biển."] },
{ q: "22. Ai vi phạm (đi đò):", ops: ["Bạn P.", "Lái đò.", "Cả hai.", "Không ai."] },
{ q: "23. HS không có trách nhiệm:", ops: ["Ban hành chính sách.", "Tuân thủ luật.", "Giúp người khác.", "Vận động người thân."] },

{ q: "24. Khái niệm:", ops: ["An ninh quốc gia.", "Bảo vệ an ninh.", "Trật tự xã hội.", "Đảm bảo TTATXH."] },
{ q: "25. Khái niệm:", ops: ["Bảo vệ an ninh quốc gia.", "An ninh quốc gia.", "TTXH.", "Đảm bảo TT."] },

{ q: "27. Khái niệm:", ops: ["Bảo đảm TTATXH.", "ANQG.", "Bảo vệ AN.", "TTXH."] },
{ q: "28. Không bao gồm:", ops: ["Bảo vệ an ninh tư tưởng.", "Trật tự công cộng.", "Chống tội phạm.", "Chống thiên tai."] },
{ q: "29. Không bao gồm:", ops: ["Bảo vệ quyền trẻ em.", "AN chính trị.", "AN con người.", "AN kinh tế."] },
{ q: "30. Trách nhiệm Đảng:", ops: ["Lãnh đạo tuyệt đối.", "Nòng cốt.", "Tố cáo.", "Cung cấp info."] },
{ q: "31. Cơ quan:", ops: ["Quốc hội.", "Chính phủ.", "MTTQ.", "Tòa án."] },
{ q: "32. Cơ quan:", ops: ["Chính phủ.", "Quốc hội.", "MTTQ.", "Tòa án."] },
{ q: "33. LLVT:", ops: ["Nòng cốt.", "Xung kích.", "Lãnh đạo.", "Tuyệt đối."] },
{ q: "34. Công dân:", ops: ["Chấp hành chủ trương.", "Bảo vệ nội bộ.", "Thi hành luật.", "Quyết định chiến tranh."] },
{ q: "35. Không phải trách nhiệm:", ops: ["Tổ chức thi hành luật.", "Chấp hành.", "Tố cáo.", "Cộng tác CA."] },
{ q: "36. HS:", ops: ["Thực hiện nội quy.", "Bảo vệ nội bộ.", "Thi hành luật.", "Quyết định chiến tranh."] },
{ q: "37. Biên giới:", ops: ["Kiểm tra cột mốc.", "Bảo vệ lãnh đạo.", "Tuyên truyền rác.", "Dọn biển."] },
{ q: "38. Trách nhiệm:", ops: ["Công dân.", "Quốc hội.", "Chính phủ.", "LLVT."] },

{ q: "39. Khái niệm:", ops: ["Mạng.", "Không gian mạng.", "An ninh mạng.", "Bảo vệ ANM."] },
{ q: "40. Khái niệm:", ops: ["Không gian mạng.", "Mạng.", "ANM.", "Bảo vệ ANM."] },
{ q: "41. Khái niệm:", ops: ["An ninh mạng.", "Mạng.", "Không gian mạng.", "Bảo vệ ANM."] },
{ q: "42. Hành vi bị cấm:", ops: ["Xuyên tạc lịch sử.", "Đăng ảnh.", "Tra cứu.", "Tương tác."] },
{ q: "43. Không bị cấm:", ops: ["Tra cứu thông tin.", "Xuyên tạc.", "Bịa đặt.", "Đánh bạc."] },
{ q: "44. Quyền trẻ em:", ops: ["Được bảo vệ.", "Kích động.", "Tấn công mạng.", "Đánh bạc."] },
{ q: "45. Không đúng:", ops: ["Phát tán tin giả.", "Bảo mật.", "Tuân thủ luật.", "Lành mạnh."] },
{ q: "46. Không phải thông tin cá nhân:", ops: ["Sở thích.", "Họ tên.", "Ngày sinh.", "Nghề nghiệp."] },
{ q: "47. Không phải bí mật:", ops: ["Nghề nghiệp.", "Hồ sơ y tế.", "Thẻ tín dụng.", "Hồ sơ thuế."] },
{ q: "48. Bảo mật:", ops: ["Dùng phần mềm chống virus.", "Chia sẻ info.", "Mật khẩu dễ.", "Wifi công cộng."] },
{ q: "49. Không vi phạm:", ops: ["H và chị gái.", "H và M.", "Chị gái và M.", "Tất cả."] },
{ q: "50. Ai vi phạm:", ops: ["Bạn A.", "Bạn V.", "Cả hai.", "Không ai."] }
];

    const quizDiv = document.getElementById('quiz');
    const correctAnswers = [];

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    data.forEach((item, index) => {
        const correct = item.ops[0];
        correctAnswers.push(correct);
        const shuffledOps = shuffle([...item.ops]);

        let html = `<div class="question">
            <p><strong>${item.q}</strong></p>
            <div class="options">`;
        shuffledOps.forEach((op, i) => {
            const label = String.fromCharCode(65 + i);
            html += `<label><input type="radio" name="q${index}" value="${op}"> ${label}. ${op}</label>`;
        });
        html += `</div></div>`;
        quizDiv.innerHTML += html;
    });

    async function sendToTelegram(name, score) {
        const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
        const text = `🎯 KẾT QUẢ KIỂM TRA\n👤 Người thi: ${name}\n📊 Điểm: ${score}/${data.length}`;
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text })
            });
            alert("Đã gửi kết quả về Telegram!");
        } catch (error) {
            console.error("Lỗi:", error);
            alert("Gửi Telegram thất bại, hãy kiểm tra lại Token và Chat ID.");
        }
    }

    function checkAnswers() {
        const name = document.getElementById('username').value.trim();
        if (!name) { alert("Vui lòng nhập tên của bạn!"); return; }

        let score = 0;
        data.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected && selected.value === correctAnswers[index]) score++;
        });

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `Bạn đã đạt: ${score}/${data.length} điểm.`;
        resultDiv.style.background = score > (data.length/2) ? "#d4edda" : "#f8d7da";
        
        sendToTelegram(name, score);
    }
</script>

</body>
</html>
