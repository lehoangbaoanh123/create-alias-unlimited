<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Dot Trick - Lách Luật </title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; text-align: center; font-size: 20px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-top: 10px; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-gen { background: #1a73e8; }
        .btn-save { background: #ea4335; }
        textarea { height: 250px; font-family: monospace; font-size: 13px; }
        .note { font-size: 12px; color: #666; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>Gmail Dot Trick (Lách Luật)</h2>
    <label>Nhập Gmail gốc:</label>
    <input type="email" id="email" placeholder="Ví dụ: baoanh20100505@gmail.com">
    
    <button class="btn-gen" onclick="generateDots()">TẠO ALIAS DẤU CHẤM</button>
    <button class="btn-save" onclick="saveFile()">LƯU FILE .TXT</button>

    <textarea id="result" readonly></textarea>
    <p class="note">* Cách này không dùng dấu (+), Nexon sẽ không báo lỗi.</p>
</div>

<script>
    function generateDots() {
        const fullEmail = document.getElementById('email').value.trim();
        if (!fullEmail.includes('@')) return alert("Nhập đúng Gmail!");
        
        const username = fullEmail.split('@')[0];
        const domain = fullEmail.split('@')[1];
        let results = [];

        // Thuật toán tạo biến thể dấu chấm đơn giản (rải dấu chấm từ trái qua phải)
        for (let i = 1; i < username.length; i++) {
            let variant = username.substring(0, i) + "." + username.substring(i) + "@" + domain;
            results.push(variant);
        }

        // Thêm một số biến thể 2 dấu chấm
        if (username.length > 4) {
             results.push(username[0] + "." + username[1] + "." + username.substring(2) + "@" + domain);
             results.push(username.substring(0, username.length - 2) + "." + username[username.length - 2] + "." + username[username.length - 1] + "@" + domain);
        }

        document.getElementById('result').value = results.join('\n');
    }

    function saveFile() {
        const text = document.getElementById('result').value;
        if (!text) return;
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'gmail_dot_trick.txt';
        a.click();
    }
</script>

</body>
</html>
